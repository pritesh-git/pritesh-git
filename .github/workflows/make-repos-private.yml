name: Make All Repos Private (Except pritesh-git)

on:
  workflow_dispatch:

jobs:
  make-private:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make all repos private (except pritesh-git)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all repositories..."
          
          # Get all repositories using pagination
          gh repo list --json nameWithOwner,isPrivate --limit 1000 -u pritesh-git > repos.json
          
          echo "Total repositories found:"
          jq length repos.json
          
          echo ""
          echo "Repositories to process:"
          jq -r '.[] | "\(.nameWithOwner) - Private: \(.isPrivate)"' repos.json
          
          echo ""
          echo "Starting to make repos private..."
          echo ""
          
          # Extract and process repos
          jq -r '.[] | select(.nameWithOwner | endswith("pritesh-git/pritesh-git") | not) | select(.isPrivate == false) | .nameWithOwner' repos.json | while read repo; do
            echo "Making $repo private..."
            if gh repo edit "$repo" --visibility private 2>&1; then
              echo "✓ Successfully made $repo private"
            else
              echo "✗ Failed to make $repo private"
            fi
            echo ""
          done
          
          echo "Workflow completed!"
