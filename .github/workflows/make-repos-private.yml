name: Make All Repos Private

on:
  workflow_dispatch:

jobs:
  make-private:
    runs-on: ubuntu-latest
    steps:
      - name: Make all repos private
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Error: secret PAT_TOKEN is not set" >&2
            exit 1
          fi

          echo "Fetching repositories..."
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/user/repos?per_page=100" | jq -r '.[].full_name')

          echo "Found:\n$REPOS"

          PRIVATE_COUNT=0
          SKIPPED_COUNT=0
          FAILED_COUNT=0

          for repo in $REPOS; do
            if [ -z "$repo" ]; then
              continue
            fi

            if [ "$repo" = "pritesh-git/pritesh-git" ]; then
              echo "Skipping $repo (excluded)"
              SKIPPED_COUNT=$((SKIPPED_COUNT+1))
              continue
            fi

            echo "Making $repo private..."
            RESP=$(curl -s -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d '{"private":true}' \
              "https://api.github.com/repos/$repo")

            if echo "$RESP" | jq -e '.private == true' >/dev/null 2>&1; then
              echo "✅ $repo is now private"
              PRIVATE_COUNT=$((PRIVATE_COUNT+1))
            else
              echo "❌ Failed to make $repo private"
              echo "$RESP"
              FAILED_COUNT=$((FAILED_COUNT+1))
            fi
          done

          echo "=========================================="
          echo "Summary:"
          echo "✅ Made private: $PRIVATE_COUNT"
          echo "⏭️  Skipped: $SKIPPED_COUNT"
          echo "❌ Failed: $FAILED_COUNT"
          echo "=========================================="
