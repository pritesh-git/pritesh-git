name: Make All Repos Private (Except pritesh-git)

on:
  workflow_dispatch:

jobs:
  make-private:
    runs-on: ubuntu-latest
    steps:
      - name: Make all repos private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all repositories
          REPOS=$(gh api user/repos --paginate -q '.[].name')
          
          echo "Found repositories:"
          echo "$REPOS"
          echo ""
          
          for repo in $REPOS; do
            if [ "$repo" = "pritesh-git" ]; then
              echo "Skipping $repo (excluded)"
              continue
            fi
            
            echo "Making $repo private..."
            gh repo edit pritesh-git/"$repo" --visibility private && echo "✓ $repo is now private" || echo "✗ Failed to make $repo private"
          done
          
          echo ""
          echo "All done!"
